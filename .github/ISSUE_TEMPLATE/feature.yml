name: Feature request
description: 提议与隔离启动器范围一致的新功能。
title: '[Feature] '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: 描述要解决的问题和当前安全边界。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: 说明预期交互、读写目录和失败方式。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive-data check
      options:
        - label: 我没有附加真实凭据、内部域名、个人路径、完整日志或第三方二进制。
          required: true
