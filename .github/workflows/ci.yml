name: build-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore and audit NuGet dependencies
        run: dotnet restore CodexMultiLauncher.slnx -p:NuGetAudit=true -p:NuGetAuditMode=all

      - name: Verify formatting
        run: dotnet format CodexMultiLauncher.slnx --verify-no-changes --no-restore

      - name: Build Release
        run: dotnet build CodexMultiLauncher.slnx -c Release --no-restore

      - name: Run tests
        run: dotnet test CodexMultiLauncher.slnx -c Release --no-build

      - name: Verify self-contained publish
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'codex-multi-launcher-publish'
          dotnet publish CodexChannelLauncher.csproj -c Release -r win-x64 --self-contained true --no-restore -o $output
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path -LiteralPath (Join-Path $output 'CodexChannelLauncher.exe'))) {
            throw 'Publish verification did not produce the expected executable.'
          }

      - name: Audit repository contents
        shell: powershell
        run: .\tools\audit-repository.ps1
