name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 3 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    if: github.event.repository.private == false
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          languages: csharp

      - name: Build
        run: |
          dotnet restore CodexMultiLauncher.slnx
          dotnet build CodexMultiLauncher.slnx -c Release --no-restore

      - name: Analyze
        uses: github/codeql-action/analyze@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
