<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title description">
  <title id="title">Codex 多开器界面预览</title>
  <desc id="description">个人空间与隔离工作空间并列显示的黑橙色启动器界面</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14110e"/>
      <stop offset="0.48" stop-color="#090a0c"/>
      <stop offset="1" stop-color="#17130f"/>
    </linearGradient>
    <linearGradient id="personal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffa14f"/>
      <stop offset="1" stop-color="#f58a32"/>
    </linearGradient>
    <linearGradient id="work" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffa14f"/>
      <stop offset="1" stop-color="#f58a32"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="#f3f4f6"/>
  <rect x="28" y="24" width="1144" height="652" rx="20" fill="url(#bg)" stroke="#292d33" filter="url(#shadow)"/>
